<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        body { font-family: sans-serif; text-align: center; background: #111; color: white; margin: 0; padding: 15px; }
        .box { background: #222; padding: 10px; border-radius: 10px; margin-bottom: 10px; }
        canvas { width: 280px; height: 280px; margin: 15px 0; }
        button { width: 100%; padding: 15px; margin: 5px 0; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .btn-spin { background: #0088cc; color: white; }
        .btn-bonus { background: #f1c40f; color: black; }
        .btn-withdraw { background: #e67e22; color: white; }
    </style>
</head>
<body>
    <div class="box">
        🎰 Spins: <span id="spins">0</span> | 💎 TON: <span id="balance">0.00</span>
    </div>

    <canvas id="wheel" width="600" height="600"></canvas>

    <button class="btn-spin" id="spin-btn" onclick="spin()">SPIN</button>
    <button class="btn-bonus" id="bonus-btn" onclick="claimBonus()">🎁 CLAIM DAILY BONUS</button>
    
    <div class="box" style="margin-top: 20px;">
        <input type="text" id="addr" placeholder="Wallet Address" style="width: 90%; padding: 10px; margin-bottom: 5px;">
        <button class="btn-withdraw" onclick="withdraw()">WITHDRAW (Min 0.5)</button>
    </div>

    <script>
        const API = "http://YOUR_VPS_IP:8000"; // CHANGE THIS
        const tg = window.Telegram.WebApp;
        const uid = tg.initDataUnsafe.user.id;

        async function load() {
            const r = await fetch(`${API}/user/${uid}`);
            const d = await r.json();
            document.getElementById('spins').innerText = d.spins;
            document.getElementById('balance').innerText = d.balance.toFixed(3);
            document.getElementById('bonus-btn').style.display = d.bonus_available ? "block" : "none";
        }

        async function claimBonus() {
            const r = await fetch(`${API}/claim_daily/${uid}`, { method: 'POST' });
            const d = await r.json();
            alert(d.message || d.detail);
            load();
        }

        async function spin() {
            const r = await fetch(`${API}/spin/${uid}`, { method: 'POST' });
            const d = await r.json();
            if(d.detail) return alert(d.detail);
            alert("Winning: " + d.win_label);
            load();
        }

        async function withdraw() {
            const addr = document.getElementById('addr').value;
            const r = await fetch(`${API}/withdraw`, {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({user_id: uid, address: addr})
            });
            const d = await r.json();
            alert(d.status === "ok" ? "Request Sent!" : d.detail);
            load();
        }

        load(); tg.expand();
    </script>
</body>
</html>
